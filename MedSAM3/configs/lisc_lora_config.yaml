# SAM3 LoRA Training Config — LISC White Blood Cell Dataset
# ==========================================================
# Fine-tunes with bounding box labels only (no segmentation masks).
# All 5 WBC classes are unified to "white blood cell" to match
# the inference prompt used in tiff_wbc_inference.py.
#
# Prepare data first:
#   python prepare_lisc_for_medsam3.py
#
# Then train:
#   python train_sam3_lora_native.py --config configs/lisc_lora_config.yaml

model:
  name: "facebook/sam3"
  cache_dir: null

lora:
  rank: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"
    - "qkv"
    - "proj"
    - "fc1"
    - "fc2"
    - "c_fc"
    - "c_proj"
    - "linear1"
    - "linear2"
  apply_to_vision_encoder: true
  apply_to_text_encoder: true
  apply_to_geometry_encoder: true
  apply_to_detr_encoder: true
  apply_to_detr_decoder: true
  apply_to_mask_decoder: true

training:
  # Path to directory containing train/ and valid/ sub-folders
  # Run prepare_lisc_for_medsam3.py first to create this.
  data_dir: "data/merged" # data_dir: "data/lisc_medsam3"

  batch_size: 1          # 195 training images → small batches
  num_workers: 2

  learning_rate: 1e-4    # Higher than full_lora (1e-4 vs 5e-5) for faster adaptation
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  max_grad_norm: 1.0

  num_epochs: 50
  warmup_steps: 50       # ~first 2 epochs
  lr_scheduler: "cosine"

  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 3

  mixed_precision: "bf16"
  seed: 42
  gradient_accumulation_steps: 4   # effective batch size = 1 × 4 = 4

output:
  output_dir: "outputs/sam3_lora_lisc"
  logging_dir: "logs/lisc"
  save_lora_only: true
  push_to_hub: false
  hub_model_id: null

evaluation:
  metric: "iou"
  save_predictions: false
  compute_metrics_during_training: true

hardware:
  device: "cuda"
  dataloader_pin_memory: true
  use_compile: false
